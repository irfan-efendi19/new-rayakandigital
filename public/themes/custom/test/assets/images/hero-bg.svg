<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c17817;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#grad)"/>
  <circle cx="300" cy="200" r="250" fill="url(#gold)"/>
  <circle cx="300" cy="450" r="300" fill="url(#gold)" opacity="0.5"/>
  <g opacity="0.15">
    <line x1="0" y1="750" x2="600" y2="650" stroke="#d4a574" stroke-width="1"/>
    <line x1="0" y1="800" x2="600" y2="700" stroke="#d4a574" stroke-width="0.5"/>
    <line x1="0" y1="850" x2="600" y2="750" stroke="#d4a574" stroke-width="0.5"/>
    <line x1="0" y1="900" x2="600" y2="800" stroke="#d4a574" stroke-width="0.3"/>
  </g>
  <g opacity="0.08">
    <circle cx="100" cy="150" r="3" fill="#fff"/>
    <circle cx="450" cy="100" r="2" fill="#fff"/>
    <circle cx="500" cy="300" r="2.5" fill="#fff"/>
    <circle cx="80" cy="350" r="1.5" fill="#fff"/>
    <circle cx="520" cy="500" r="2" fill="#fff"/>
    <circle cx="150" cy="550" r="1.5" fill="#fff"/>
    <circle cx="400" cy="650" r="2" fill="#fff"/>
    <circle cx="200" cy="700" r="1.5" fill="#fff"/>
  </g>
  <!-- Decorative frame -->
  <rect x="30" y="30" width="540" height="840" rx="20" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.3"/>
</svg>
